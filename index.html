<!DOCTYPE html>
<html>
<head>
  <title>Card Game Hub</title>
  <style>
    body {
      font-family: Arial;
      background: #1e1e2f;
      color: white;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    #gameArea {
      margin-top: 20px;
    }
    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>
<body>

<h1>🎴 Card Game Hub</h1>

<div id="menu">
  <h2>Select a Game</h2>
  <button onclick="selectGame('gofish')">Go Fish</button>
  <button onclick="selectGame('spades')">Spades</button>
  <button onclick="selectGame('hearts')">Hearts</button>
  <button onclick="selectGame('solitaire')">Solitaire</button>
</div>

<div id="modeSelect" style="display:none;">
  <h2>Choose Mode</h2>
  <button onclick="startBotGame()">Play vs Bots</button>
  <button onclick="showMultiplayer()">Play Online</button>
</div>

<div id="multiplayer" style="display:none;">
  <h2>Multiplayer</h2>
  <input id="roomCode" placeholder="Enter Room Code">
  <br>
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
  <p id="roomDisplay"></p>
</div>

<div id="gameArea"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script>
let selectedGame = "";

// 🔥 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function selectGame(game) {
  selectedGame = game;
  document.getElementById("menu").style.display = "none";
  document.getElementById("modeSelect").style.display = "block";
}

function startBotGame() {
  document.getElementById("modeSelect").style.display = "none";
  document.getElementById("gameArea").innerHTML =
    "<h2>Playing " + selectedGame + " vs Bots</h2>";
  
  if (selectedGame === "gofish") startGoFish();
}

function showMultiplayer() {
  document.getElementById("modeSelect").style.display = "none";
  document.getElementById("multiplayer").style.display = "block";
}

function createRoom() {
  const code = Math.random().toString(36).substring(2, 7).toUpperCase();
  db.ref("rooms/" + code).set({
    game: selectedGame,
    players: 1,
    state: {}
  });
  document.getElementById("roomDisplay").innerText = "Room Code: " + code;
}

function joinRoom() {
  const code = document.getElementById("roomCode").value.toUpperCase();
  const roomRef = db.ref("rooms/" + code);

  roomRef.once("value", (snap) => {
    if (snap.exists()) {
      roomRef.update({
        players: snap.val().players + 1
      });
      document.getElementById("roomDisplay").innerText =
        "Joined Room: " + code;
      startMultiplayerGame(code);
    } else {
      alert("Room not found!");
    }
  });
}

function startMultiplayerGame(code) {
  document.getElementById("multiplayer").style.display = "none";
  document.getElementById("gameArea").innerHTML =
    "<h2>Multiplayer " + selectedGame + " (Room: " + code + ")</h2>";

  // Listen for updates
  db.ref("rooms/" + code).on("value", (snap) => {
    console.log("Game update:", snap.val());
  });
}

/* -----------------------
   SIMPLE GO FISH (BOT)
----------------------- */
function startGoFish() {
  let playerCards = ["A", "K", "Q", "J", "10"];
  let botCards = ["9", "8", "7", "6", "5"];

  renderGoFish(playerCards, botCards);
}

function renderGoFish(player, bot) {
  let html = "<h3>Your Cards:</h3>";

  player.forEach(card => {
    html += `<button onclick="askCard('${card}')">${card}</button>`;
  });

  document.getElementById("gameArea").innerHTML = html;
}

function askCard(card) {
  alert("You asked for " + card + "! (Game logic placeholder)");
}
</script>

</body>
</html>
