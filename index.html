<!DOCTYPE html>
<html>
<head>
  <title>P2P Card Game</title>
  <style>
    body { font-family: Arial; background:#1e1e2f; color:white; text-align:center; }
    textarea { width:90%; height:100px; margin:10px; }
    button { padding:10px; margin:5px; border:none; border-radius:8px; background:#4CAF50; color:white; }
  </style>
</head>
<body>

<h1>🎴 P2P Card Game (WebRTC)</h1>

<button onclick="createGame()">Create Game</button>
<button onclick="joinGame()">Join Game</button>

<div id="connection"></div>
<div id="game"></div>

<script>
let pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

let channel;

function createGame() {
  channel = pc.createDataChannel("game");

  setupChannel();

  pc.createOffer().then(offer => {
    pc.setLocalDescription(offer);
    setTimeout(() => {
      document.getElementById("connection").innerHTML = `
        <h3>Send this code to friend:</h3>
        <textarea>${JSON.stringify(pc.localDescription)}</textarea>
        <h3>Paste answer:</h3>
        <textarea id="answer"></textarea>
        <button onclick="submitAnswer()">Connect</button>
      `;
    }, 1000);
  });
}

function submitAnswer() {
  let answer = JSON.parse(document.getElementById("answer").value);
  pc.setRemoteDescription(answer);
}

function joinGame() {
  document.getElementById("connection").innerHTML = `
    <h3>Paste host code:</h3>
    <textarea id="offer"></textarea>
    <button onclick="submitOffer()">Continue</button>
  `;
}

function submitOffer() {
  let offer = JSON.parse(document.getElementById("offer").value);

  pc.setRemoteDescription(offer);

  pc.ondatachannel = (event) => {
    channel = event.channel;
    setupChannel();
  };

  pc.createAnswer().then(answer => {
    pc.setLocalDescription(answer);
    setTimeout(() => {
      document.getElementById("connection").innerHTML = `
        <h3>Send this back to host:</h3>
        <textarea>${JSON.stringify(pc.localDescription)}</textarea>
      `;
    }, 1000);
  });
}

function setupChannel() {
  channel.onopen = () => {
    document.getElementById("connection").innerHTML = "<h2>Connected ✅</h2>";
    startGame();
  };

  channel.onmessage = (event) => {
    receiveMove(event.data);
  };
}

/* -------- SIMPLE GAME (DEMO) -------- */

let myTurn = false;

function startGame() {
  document.getElementById("game").innerHTML = `
    <h2>Simple Card Demo</h2>
    <button onclick="playCard('A')">Play A</button>
    <button onclick="playCard('K')">Play K</button>
    <p id="log"></p>
  `;

  myTurn = true;
}

function playCard(card) {
  if (!myTurn) return alert("Not your turn!");
  
  log("You played " + card);
  channel.send(card);
  myTurn = false;
}

function receiveMove(card) {
  log("Opponent played " + card);
  myTurn = true;
}

function log(text) {
  document.getElementById("log").innerHTML += text + "<br>";
}
</script>

</body>
</html>
